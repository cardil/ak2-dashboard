name: CI

on:
  push:
    branches:
      - main
      - 'release-**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - 'release-**'
  workflow_dispatch:

env:
  USE_DOCKER: 1
  CC_CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/ak2-dashboard/arm-cross-cc
  E2E_CACHE_IMAGE: ghcr.io/${{ github.repository_owner }}/ak2-dashboard/e2e-testbed

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linting and tests
        run: make lint test
        env:
          DOCKER_CACHE_IMAGE: ${{ env.CC_CACHE_IMAGE }}

  build:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build project
        run: make
        env:
          DOCKER_CACHE_IMAGE: ${{ env.CC_CACHE_IMAGE }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: webserver-package
          path: webserver/webserver.zip

      - name: Display package info
        run: |
          echo "Package size: $(du -h webserver/webserver.zip | awk '{print $1}')"
          ls -lh webserver/webserver.zip

  e2e:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Install Playwright system dependencies
        run: npx --yes playwright install-deps chromium

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E pipeline
        run: make e2e
        env:
          E2E_EXPECT_TIMEOUT: 30000
          E2E_SERVICE_TIMEOUT: 5000
          E2E_UI_TRANSITION_TIMEOUT: 2000
          E2E_PAGE_LOAD_TIMEOUT: 5000
          E2E_LOG_REFRESH_TIMEOUT: 3000
          DOCKER_CACHE_IMAGE: ${{ env.CC_CACHE_IMAGE }}
          E2E_CACHE_IMAGE: ${{ env.E2E_CACHE_IMAGE }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
