# Webfsd configuration for AK2 Dashboard
# One option per line. Comment/uncomment to enable/disable.
# See webfsd --help for available options.
#
# Format:
#   -flag           (boolean flag)
#   -option value   (option with argument)

# TCP port
-p 80

# Document root
-r /mnt/UDISK/webfs

# Disable directory listings (enabling will make file browser non-functional)
# -j

# Log file (for error/debug messages)
-l /mnt/UDISK/webfsd.log

# Enable access logging (uncomment to log HTTP requests)
# -A

# Enable debug output (uncomment for verbose logging)
# -d
