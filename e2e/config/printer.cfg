# Sample Klipper printer configuration for E2E testing
# This is a minimal configuration with bed_mesh section for testing

[stepper_x]
step_pin: PE5
dir_pin: PE6
enable_pin: !PC13
microsteps: 16
rotation_distance: 40
endstop_pin: !PG10
position_endstop: -6.0
position_min: -6
position_max: 223
homing_speed: 60

[stepper_y]
step_pin: PE2
dir_pin: PE3
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: !PG9
position_endstop: -2
position_min: -2
position_max: 223
homing_speed: 60

[stepper_z]
step_pin: PB8
dir_pin: !PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 250
homing_speed: 10

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PB6
microsteps: 16
rotation_distance: 7.68
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PG12
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA1
control: pid
pid_kp: 18.240
pid_ki: 0.558
pid_kd: 149.109
min_temp: 0
max_temp: 275
min_extrude_temp: 150
max_extrude_only_distance: 500
pressure_advance: 0.032

[heater_bed]
heater_pin: PG11
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_kp: 60.061
pid_ki: 0.400
pid_kd: 2254.534
min_temp: 0
max_temp: 120

[probe]
pin: !PG8
x_offset: -24.0
y_offset: 0.0
z_offset: 0.0
speed: 1
samples: 3
samples_result: average
sample_retract_dist: 3.0
samples_tolerance: 0.05
samples_tolerance_retries: 3

[bed_mesh]
speed: 150
horizontal_move_z: 5
mesh_min: 5, 5
mesh_max: 199, 218
probe_count: 5, 5
algorithm: bicubic
bicubic_tension: 0.2
mesh_pps: 4, 4

[bed_mesh default]
version = 1
points =
	-0.037500, -0.025000, -0.025000, -0.025000, -0.010000
	-0.020000, -0.010000, -0.002500, 0.000000, 0.007500
	-0.010000, 0.000000, 0.007500, 0.012500, 0.020000
	0.000000, 0.010000, 0.017500, 0.025000, 0.032500
	0.012500, 0.022500, 0.030000, 0.037500, 0.045000
x_count = 5
y_count = 5
mesh_x_pps = 4
mesh_y_pps = 4
algo = bicubic
tension = 0.2
min_x = 5.0
max_x = 199.0
min_y = 5.0
max_y = 218.0

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_ORIGIN
variable_bed_mesh_temp: 60
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(bed_mesh_temp)|int %}
  M140 S{BED_TEMP}
  G28
  M190 S{BED_TEMP}
  BED_MESH_CALIBRATE_ORIGIN
  SAVE_CONFIG

[mcu]
serial: /dev/ttyS0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 20
max_z_accel: 100

[firmware_retraction]
retract_length: 0.4
retract_speed: 30
unretract_extra_length: 0
unretract_speed: 30

[virtual_sdcard]
path: /mnt/UDISK/gcodes

[pause_resume]

[display_status]

[respond]

[exclude_object]

[gcode_arcs]
resolution: 0.1