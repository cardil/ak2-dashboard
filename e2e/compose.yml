---

services:
  printer-testbed:
    image: localhost/e2e_printer-testbed:latest
    platform: linux/arm/v7
    build:
      context: ..
      dockerfile: e2e/Dockerfile
      platforms:
        - linux/arm/v7
    container_name: ak2-testbed
    hostname: printer-testbed
    ports:
      - "20022:22"   # SSH access for deployment
      - "20080:80"   # Webserver HTTP access
    restart: unless-stopped
    # Simulate printer's limited memory (~110MB total RAM)
    mem_limit: 110m
    memswap_limit: 110m
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 1s
      timeout: 1s
      retries: 5
      start_period: 2s
    networks:
      - printer-net

networks:
  printer-net:
    driver: bridge